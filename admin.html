<!doctype html>
<html lang="pt-br">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin Produtos</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<header class="topbar">

<h1>Admin Catálogo</h1>

<div class="actions">

<button id="exportBtn" class="btn primary">
Exportar JSON
</button>

<button id="importBtn" class="btn">
Importar JSON
</button>

</div>

</header>


<main class="container">


<section class="formSection">

<h2>Novo Produto</h2>

<form id="productForm">

<input type="hidden" id="editIndex">

<label>
SKU
<input id="id" required>
</label>

<label>
Nome
<input id="name" required>
</label>

<label>
Preço
<input id="price" type="number" step="0.01" required>
</label>

<label>
Categoria
<input id="category" required>
</label>

<label>
Imagem (arquivo em /assets/products/)
<input id="image">
</label>

<label class="checkLine">

<input id="isOffer" type="checkbox">

Produto em oferta

</label>

<label>
Preço antigo (de:)
<input id="oldPrice" type="number" step="0.01" disabled>
</label>

<div class="buttons">

<button class="btn primary" type="submit">
Salvar
</button>

<button class="btn" type="button" id="resetBtn">
Limpar
</button>

<button class="btn danger" type="button" id="deleteBtn">
Excluir
</button>

</div>

</form>

</section>


<section class="listSection">

<h2>Produtos</h2>

<div id="productList"></div>

</section>


</main>


<input type="file" id="fileInput" accept="application/json" style="display:none">

<script src="js/admin.js"></script>

</body>
</html>
